version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: winston
    main: ./cmd/winston
    binary: winston
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

dockers:
  - image_templates:
      - ghcr.io/gosusnp/winston:{{.Tag}}-amd64
    use: buildx
    build_flag_templates:
      - --platform=linux/amd64
    ids:
      - winston

  - image_templates:
      - ghcr.io/gosusnp/winston:{{.Tag}}-arm64
    use: buildx
    build_flag_templates:
      - --platform=linux/arm64
    goarch: arm64
    ids:
      - winston

docker_manifests:
  - name_template: ghcr.io/gosusnp/winston:{{.Tag}}
    image_templates:
      - ghcr.io/gosusnp/winston:{{.Tag}}-amd64
      - ghcr.io/gosusnp/winston:{{.Tag}}-arm64

  - name_template: ghcr.io/gosusnp/winston:latest
    image_templates:
      - ghcr.io/gosusnp/winston:{{.Tag}}-amd64
      - ghcr.io/gosusnp/winston:{{.Tag}}-arm64

archives:
  - formats: [tar.gz]
    name_template: "{{.ProjectName}}_{{.Os}}_{{.Arch}}"

changelog:
  use: github
