apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "winston.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "winston.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "winston.fullname" . }}
    spec:
      serviceAccountName: {{ include "winston.fullname" . }}
      securityContext:
        fsGroup: 65532
      containers:
        - name: winston
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: WINSTON_DB_PATH
              value: /data/winston.db
            - name: WINSTON_PORT
              value: "{{ .Values.service.port }}"
            - name: WINSTON_COLLECT_INTERVAL
              value: "{{ .Values.collector.intervalSeconds }}"
            - name: WINSTON_RETENTION_RAW_S
              value: "{{ .Values.retention.rawSeconds | int }}"
            - name: WINSTON_RETENTION_1H_S
              value: "{{ .Values.retention.oneHourSeconds | int }}"
            - name: WINSTON_RETENTION_1D_S
              value: "{{ .Values.retention.oneDaySeconds | int }}"
            - name: WINSTON_POD_TTL_S
              value: "{{ .Values.analyzer.podTTLSeconds }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "winston.fullname" . }}-data
