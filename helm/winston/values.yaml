image:
  repository: ghcr.io/gosusnp/winston
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

collector:
  intervalSeconds: 60  # should match the metrics-server scrape interval (default 60s)

retention:
  rawHours: 24      # raw 1-min samples kept for this many hours
  oneHourDays: 7    # 1h aggregates kept for this many days
  oneDayDays: 30    # 1d aggregates kept for this many days

storage:
  size: 1Gi
  storageClassName: ""  # leave empty to use the cluster default

service:
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi
