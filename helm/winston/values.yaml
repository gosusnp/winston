image:
  repository: ghcr.io/gosusnp/winston
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

collector:
  intervalSeconds: 60  # should match the metrics-server scrape interval (default 60s)

retention:
  rawSeconds: 86400      # raw 1-min samples kept for this many seconds (default: 24h)
  oneHourSeconds: 604800    # 1h aggregates kept for this many seconds (default: 7d)
  oneDaySeconds: 2592000    # 1d aggregates kept for this many seconds (default: 30d)

analyzer:
  podTTLSeconds: 3600  # pods with no raw metric within this TTL are excluded from all profiles; increase for infrequent cronjobs

storage:
  size: 1Gi
  storageClassName: ""  # leave empty to use the cluster default

service:
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi
