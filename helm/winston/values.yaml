image:
  repository: ghcr.io/gosusnp/winston
  tag: latest
  pullPolicy: IfNotPresent

collector:
  intervalSeconds: 60

retention:
  rawHours: 24
  oneHourDays: 7
  oneDayDays: 30

storage:
  size: 1Gi
  storageClassName: ""  # leave empty to use the cluster default

service:
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
